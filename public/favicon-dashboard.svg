<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="8" fill="url(#g)"/>
  <!-- Grid of 4 dashboard tiles -->
  <rect x="5" y="5" width="9" height="9" rx="2" fill="white" opacity="0.95"/>
  <rect x="18" y="5" width="9" height="9" rx="2" fill="white" opacity="0.6"/>
  <rect x="5" y="18" width="9" height="9" rx="2" fill="white" opacity="0.6"/>
  <rect x="18" y="18" width="9" height="9" rx="2" fill="white" opacity="0.95"/>
  <!-- Bar chart in top-left tile -->
  <rect x="7" y="11" width="1.5" height="2" rx="0.5" fill="#3b82f6"/>
  <rect x="9.5" y="9.5" width="1.5" height="3.5" rx="0.5" fill="#3b82f6"/>
  <rect x="12" y="8" width="1.5" height="5" rx="0.5" fill="#3b82f6"/>
  <!-- Trend line in bottom-right tile -->
  <polyline points="20,25 23,22 26,23.5" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="26" cy="23.5" r="1" fill="#3b82f6"/>
</svg>
