<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="8" fill="url(#g)"/>
  <!-- Credit card -->
  <rect x="4" y="9" width="24" height="16" rx="3" fill="white" opacity="0.95"/>
  <!-- Magnetic stripe -->
  <rect x="4" y="13" width="24" height="4" fill="#10b981" opacity="0.3"/>
  <!-- Chip -->
  <rect x="8" y="17" width="5" height="4" rx="1" fill="#10b981" opacity="0.5"/>
  <!-- Card number dots -->
  <circle cx="14" cy="21" r="1" fill="#10b981" opacity="0.6"/>
  <circle cx="17" cy="21" r="1" fill="#10b981" opacity="0.6"/>
  <circle cx="20" cy="21" r="1" fill="#10b981" opacity="0.6"/>
  <circle cx="23" cy="21" r="1" fill="#10b981" opacity="0.6"/>
  <!-- KES symbol -->
  <text x="16" y="12.5" font-family="Arial" font-size="5" font-weight="bold" fill="#059669" text-anchor="middle" opacity="0.8">KES</text>
</svg>
